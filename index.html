<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(225, 56, 225);
            color: #f0ebeb;
            /* keep minimum height and padding unchanged */
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: transparent;
        }

        h1, h2, label, p, th, td, .stat-label, .renewal-title, .renewal-info, .empty-state, .message {
            color: #000000;
        }

        .card, .stat-card, table, .modal-content {
            background: #FFFFFF;
            color: #1A202C;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        header p {
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-left: 5px solid #667eea;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-small {
            width: auto;
            padding: 8px 15px;
            font-size: 0.85em;
        }

        .btn-edit {
            background: #48bb78;
        }

        .btn-edit:hover {
            background: #38a169;
        }

        .btn-delete {
            background: #f56565;
        }

        .btn-delete:hover {
            background: #e53e3e;
        }

        .btn-close {
            background: #a0aec0;
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .btn-close:hover {
            background: #718096;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #f7fafc;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            color: #2d3748;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f7fafc;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .renewal-item {
            background: #f7fafc;
            padding: 15px;
            border-left: 4px solid #ed8936;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .renewal-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .renewal-info {
            font-size: 0.9em;
            color: #666;
        }

        .renewal-days {
            background: #fed7d7;
            color: #c53030;
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            border: none;
            padding: 0;
            margin: 0;
            font-size: 1.5em;
        }

        .close-btn {
            font-size: 2em;
            font-weight: bold;
            color: #a0aec0;
            cursor: pointer;
            background: none;
            border: none;
            width: auto;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: #2d3748;
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
            display: block;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #a0aec0;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💳 Subscription Dashboard</h1>
            <p>Manage and track all your subscriptions</p>
        </header>

        <!-- Statistics Cards -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-label">Total Monthly Spend</div>
                <div class="stat-value" id="totalSpend">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Subscriptions</div>
                <div class="stat-value" id="totalSubscriptions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Subscriptions</div>
                <div class="stat-value" id="activeSubscriptions">0</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="dashboard-grid">
            <!-- Add Form -->
            <div class="card">
                <h2>➕ Add Subscription</h2>
                <div class="message" id="formMessage"></div>
                <form id="subscriptionForm">
                    <div class="form-group">
                        <label for="title">Service Name *</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cost">Monthly Cost ($) *</label>
                            <input type="number" id="cost" name="cost" step="0.01" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="type">Type *</label>
                            <select id="type" name="type" required>
                                <option value="">Select Type</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Yearly">Yearly</option>
                                <option value="Weekly">Weekly</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startDate">Start Date *</label>
                            <input type="date" id="startDate" name="startDate" required>
                        </div>
                        <div class="form-group">
                            <label for="endDate">End Date *</label>
                            <input type="date" id="endDate" name="endDate" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="autopay">
                            <input type="checkbox" id="autopay" name="autopay" style="width: auto; margin-right: 8px;">
                            Enable Auto-Pay
                        </label>
                    </div>

                    <button type="submit">Add Subscription</button>
                </form>
            </div>

            <!-- Upcoming Renewals -->
            <div class="card">
                <h2>📅 Upcoming Renewals</h2>
                <div id="upcomingRenewalsContainer" class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No upcoming renewals</p>
                </div>
            </div>
        </div>

        <!-- Subscriptions Table -->
        <div class="card">
            <h2>📋 Your Subscriptions</h2>
            <div id="tableContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading subscriptions...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Subscription</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="message" id="editMessage"></div>
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label for="editTitle">Service Name *</label>
                    <input type="text" id="editTitle" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editCost">Monthly Cost ($) *</label>
                        <input type="number" id="editCost" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="editType">Type *</label>
                        <select id="editType" required>
                            <option value="Monthly">Monthly</option>
                            <option value="Yearly">Yearly</option>
                            <option value="Weekly">Weekly</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartDate">Start Date *</label>
                        <input type="date" id="editStartDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editEndDate">End Date *</label>
                        <input type="date" id="editEndDate" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="editAutopay">
                        <input type="checkbox" id="editAutopay" style="width: auto; margin-right: 8px;">
                        Enable Auto-Pay
                    </label>
                </div>

                <button type="submit">Update Subscription</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        // Load dashboard on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            document.getElementById('subscriptionForm').addEventListener('submit', addSubscription);
            document.getElementById('editForm').addEventListener('submit', updateSubscription);
        });

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                const data = await response.json();

                // Update stats
                document.getElementById('totalSpend').textContent = `$${data.total_monthly_spend.toFixed(2)}`;
                document.getElementById('totalSubscriptions').textContent = data.total_subscriptions;
                document.getElementById('activeSubscriptions').textContent = data.active_subscriptions;

                // Load subscriptions table
                loadSubscriptionsTable(data.subscriptions);

                // Load upcoming renewals
                loadUpcomingRenewals(data.upcoming_renewals);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showMessage('Error loading dashboard', 'error', 'tableContainer');
            }
        }

        function loadSubscriptionsTable(subscriptions) {
            const tableContainer = document.getElementById('tableContainer');
            
            if (subscriptions.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No subscriptions yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Service</th>
                            <th>Cost</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Days Left</th>
                            <th>Auto-Pay</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            subscriptions.forEach(sub => {
                const status = sub.is_active ? '✅ Active' : '❌ Inactive';
                const autopayStatus = sub.autopay ? '✓' : '✗';
                tableHTML += `
                    <tr>
                        <td>${sub.title}</td>
                        <td>$${sub.cost.toFixed(2)}</td>
                        <td>${sub.type}</td>
                        <td>${status}</td>
                        <td>${sub.days_left}</td>
                        <td>${autopayStatus}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-small btn-edit" onclick="openEditModal(${sub.id})">Edit</button>
                                <button class="btn-small btn-delete" onclick="deleteSubscription(${sub.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = tableHTML;
        }

        function loadUpcomingRenewals(renewals) {
            const container = document.getElementById('upcomingRenewalsContainer');
            
            if (renewals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No upcoming renewals</p>
                    </div>
                `;
                return;
            }

            let html = '';
            renewals.forEach(renewal => {
                const daysText = renewal.days_until_renewal === 1 ? 'day' : 'days';
                html += `
                    <div class="renewal-item">
                        <div class="renewal-title">${renewal.title}</div>
                        <div class="renewal-info">
                            Cost: <strong>$${renewal.cost.toFixed(2)}</strong> | 
                            <span class="renewal-days">${renewal.days_until_renewal} ${daysText}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function addSubscription(e) {
            e.preventDefault();

            const formData = {
                title: document.getElementById('title').value,
                cost: parseFloat(document.getElementById('cost').value),
                type: document.getElementById('type').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                autopay: document.getElementById('autopay').checked
            };

            try {
                const response = await fetch(`${API_BASE}/subscriptions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error('Failed to add subscription');
                }

                showMessage('Subscription added successfully!', 'success', 'formMessage');
                document.getElementById('subscriptionForm').reset();
                setTimeout(loadDashboard, 1000);
            } catch (error) {
                console.error('Error adding subscription:', error);
                showMessage('Error adding subscription', 'error', 'formMessage');
            }
        }

        async function openEditModal(id) {
            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}`);
                const sub = await response.json();

                document.getElementById('editId').value = id;
                document.getElementById('editTitle').value = sub.title;
                document.getElementById('editCost').value = sub.cost;
                document.getElementById('editType').value = sub.type;
                document.getElementById('editStartDate').value = sub.start_date;
                document.getElementById('editEndDate').value = sub.end_date;
                document.getElementById('editAutopay').checked = sub.autopay;

                document.getElementById('editModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading subscription:', error);
                showMessage('Error loading subscription', 'error', 'editMessage');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        async function updateSubscription(e) {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const formData = {
                title: document.getElementById('editTitle').value,
                cost: parseFloat(document.getElementById('editCost').value),
                type: document.getElementById('editType').value,
                start_date: document.getElementById('editStartDate').value,
                end_date: document.getElementById('editEndDate').value,
                autopay: document.getElementById('editAutopay').checked
            };

            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error('Failed to update subscription');
                }

                showMessage('Subscription updated successfully!', 'success', 'editMessage');
                setTimeout(() => {
                    closeEditModal();
                    loadDashboard();
                }, 1000);
            } catch (error) {
                console.error('Error updating subscription:', error);
                showMessage('Error updating subscription', 'error', 'editMessage');
            }
        }

        async function deleteSubscription(id) {
            if (!confirm('Are you sure you want to delete this subscription?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Failed to delete subscription');
                }

                loadDashboard();
            } catch (error) {
                console.error('Error deleting subscription:', error);
                alert('Error deleting subscription');
            }
        }

        function showMessage(text, type, containerId) {
            const messageDiv = document.getElementById(containerId)?.querySelector('.message') || 
                             document.createElement('div');
            if (!messageDiv.id) {
                messageDiv.className = 'message';
                messageDiv.id = `msg-${Date.now()}`;
            }
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }

        // Set today's date as default start date
        document.getElementById('startDate').valueAsDate = new Date();
        document.getElementById('endDate').valueAsDate = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
    </script>
</body>
</html>
